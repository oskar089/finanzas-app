<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
      }
      .loader {
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #4caf50;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p>Iniciando sesión...</p>
    </div>

    <script>
      // Extract token from URL query parameter
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const error = params.get("error");

      if (error) {
        // Store error in sessionStorage for the main app to display
        sessionStorage.setItem("oauth_error", decodeURIComponent(error));
        window.location.replace("/");
      } else if (token) {
        // Store token in localStorage (same key used by api.js)
        localStorage.setItem("token", token);

        // Clean URL — remove query params without reloading
        if (window.history.replaceState) {
          window.history.replaceState(null, "", "/auth/callback.html");
        }

        // Redirect to main application
        window.location.replace("/");
      } else {
        // No token — redirect to login page with error
        sessionStorage.setItem("oauth_error", "oauth_failed");
        window.location.replace("/");
      }
    </script>
  </body>
</html>
