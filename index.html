<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Finanzas App</title>
  </head>
  <body>
    <header>
      <h1>Finanzas App</h1>
      <p>Bienvenido a tu aplicación de finanzas personal.</p>
    </header>
    <main>
      <div class="container mt-4">
        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <span id="totalBalance">€0.00</span>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-header">Nuevo Movimiento</div>
              <div class="card-body">
                <form action="">
                  <input
                    type="text"
                    id="concepto"
                    placeholder="Concepto"
                    required
                  />
                  <input
                    type="number"
                    id="monto"
                    placeholder="Monto (€)"
                    required
                  />
                  <select id="tipo" required>
                    <option value="ingreso">Ingreso</option>
                    <option value="gasto">Gasto</option>
                  </select>
                  <select id="categoria" required>
                    <option value="alimentacion">Alimentación</option>
                    <option value="transporte">Transporte</option>
                    <option value="entretenimiento">Entretenimiento</option>
                    <option value="salud">Salud</option>
                  </select>
                  <input type="date" id="fecha" required />
                  <button type="submit" id="addMovimientoBtn">
                    Agregar Movimiento
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-header">Movimientos</div>
              <div class="card-body">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Fecha</th>
                      <th>Concepto</th>
                      <th>Tipo</th>
                      <th>Categoria</th>
                      <th>Monto (€)</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="movimientosTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Finanzas App. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
