<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <title>Finanzas App</title>
  </head>
  <body>
    <header>
      <h1>Finanzas App</h1>
      <p>Bienvenido a tu aplicación de finanzas personal.</p>
    </header>
    <main>
      <div class="container mt-4">
        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-body">
                <span id="totalBalance">Balance: €0.00</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Filtrar movimientos</div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <label for="filterTipo">Tipo</label>
                <select id="filterTipo" class="form-select">
                  <option value="todos">Todos</option>
                  <option value="ingreso">Ingresos</option>
                  <option value="gasto">Gastos</option>
                </select>
              </div>
              <div class="col-md-3">
                <label for="filterCategoria">Categoría</label>
                <select id="filterCategoria" class="form-select">
                  <option value="todas">Todas</option>
                  <option value="alimentacion">Alimentación</option>
                  <option value="transporte">Transporte</option>
                  <option value="entretenimiento">Entretenimiento</option>
                  <option value="salud">Salud</option>
                  <option value="otros">Otros</option>
                </select>
              </div>
              <div class="col-md-3">
                <label for="filterFechaDesde">Fecha desde</label>
                <input type="date" id="filterFechaDesde" class="form-control" />
              </div>
              <div class="col-md-3">
                <label for="filterFechaHasta">Fecha hasta</label>
                <input type="date" id="filterFechaHasta" class="form-control" />
              </div>
              <div class="col-md-3">
                <label for="filterMontoMax">Monto máx.</label>
                <input
                  type="number"
                  id="filterMontoMax"
                  class="form-control"
                  placeholder="€" />
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-header">Nuevo Movimiento</div>
              <div class="card-body">
                <form id="addMovementForm">
                  <div class="row g-3">
                    <div class="col-md-4">
                      <label class="form-label" for="concepto">Concepto</label>
                      <input
                        type="text"
                        id="concepto"
                        class="form-control"
                        placeholder="Ej: Café"
                        required />
                    </div>
                    <div class="col-md-2">
                      <label class="form-label" for="monto">Monto (€)</label>
                      <input
                        type="text"
                        id="monto"
                        class="form-control"
                        placeholder="0.00"
                        inputmode="decimal"
                        required />
                    </div>
                    <div class="col-md-2">
                      <label class="form-label" for="tipo">Tipo</label>
                      <select id="tipo" class="form-select" required>
                        <option value="ingreso">💰 Ingreso</option>
                        <option value="gasto">💸 Gasto</option>
                      </select>
                    </div>
                    <div class="col-md-2">
                      <label class="form-label" for="categoria">Categoría</label>
                      <select id="categoria" class="form-select" required>
                        <option value="alimentacion">Alimentación</option>
                        <option value="transporte">Transporte</option>
                        <option value="entretenimiento">Entretenimiento</option>
                        <option value="salud">Salud</option>
                        <option value="otros">Otros</option>
                      </select>
                    </div>
                    <div class="col-md-2">
                      <label class="form-label" for="fecha">Fecha</label>
                      <input
                        type="date"
                        id="fecha"
                        class="form-control"
                        required />
                    </div>
                  </div>

                  <div class="row g-2 mt-3">
                    <div class="col-md-6">
                      <button
                        type="submit"
                        id="addMovimientoBtn"
                        class="btn btn-primary w-100">
                        + Agregar Movimiento
                      </button>
                    </div>
                    <div class="col-md-6">
                      <button
                        type="button"
                        id="btnExportCSV"
                        class="btn btn-success w-100">
                        📥 Exportar a Excel
                      </button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-header">Movimientos</div>
              <div class="card-body">
                <table class="table">
                  <thead>
                    <tr>
                      <th data-column="fecha">Fecha</th>
                      <th data-column="concepto">Concepto</th>
                      <th data-column="tipo">Tipo</th>
                      <th data-column="categoria">Categoria</th>
                      <th data-column="monto">Monto (€)</th>
                      <th>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="movimientosTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Finanzas App. Todos los derechos reservados.</p>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
